<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法文單字微學習 - 儀表板 (Dashboard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 設定 Tailwind 使用 class 模式來切換深色主題
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Poppins:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', 'Noto Sans TC', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen text-slate-800 dark:text-slate-200 antialiased py-12 px-4 transition-colors duration-300">

    <!-- 深淺色切換按鈕 -->
    <button onclick="toggleTheme()" class="fixed top-6 right-6 p-3 rounded-full bg-white dark:bg-slate-800 shadow-md border border-slate-200 dark:border-slate-700 hover:shadow-lg transition-all duration-300 z-50 flex items-center justify-center" title="切換深淺色">
        <span id="theme-icon" class="text-xl">☀️</span>
    </button>

    <div class="max-w-6xl mx-auto">
        
        <!-- 頂部標題區 -->
        <header class="mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-4xl font-bold text-slate-900 dark:text-slate-100 tracking-tight mb-2 transition-colors">
                    📚 Mon Tableau de Bord
                </h1>
                <p class="text-slate-600 dark:text-slate-400 transition-colors">
                    法文單字微學習儀表板，點擊卡片進入專屬學習頁面。
                </p>
            </div>
            
            <!-- 搜尋框 (視覺展示用) -->
            <div class="relative w-full md:w-72">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                    </svg>
                </div>
                <input type="text" class="block w-full p-3 pl-10 text-sm text-slate-900 border border-slate-200 rounded-xl bg-white focus:ring-indigo-500 focus:border-indigo-500 dark:bg-slate-800 dark:border-slate-700 dark:placeholder-slate-400 dark:text-white dark:focus:ring-indigo-500 dark:focus:border-indigo-500 outline-none transition-colors shadow-sm" placeholder="搜尋單字...">
            </div>
        </header>

        <!-- 單字卡片網格 (Grid) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            
            <!-- 單字卡片 1: Renverser (有真實連結) -->
            <!-- href 指向我們剛剛做的檔案，假設命名為 renverser.html -->
            <a href="vocabulary/renverser.html" class="group block bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-indigo-500 group-hover:bg-indigo-400 transition-colors"></div>
                <div class="flex justify-between items-start mb-4">
                    <span class="inline-block bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 text-[11px] font-bold tracking-wider uppercase px-2.5 py-1 rounded-md transition-colors">
                        動詞 (v.t.)
                    </span>
                    <span class="text-xl opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-2 group-hover:translate-x-0">
                        ➡️
                    </span>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-1 transition-colors">Renverser</h3>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-4 transition-colors">打翻 / 翻覆</p>
                
                <div class="pt-4 border-t border-slate-100 dark:border-slate-700/50 flex justify-between items-center text-xs text-slate-400 dark:text-slate-500">
                    <span>介系詞搭配：sur / dans</span>
                    <span class="flex items-center gap-1">⚡ 3 結構</span>
                </div>
            </a>

            <!-- 單字卡片 2: 範例預留檔 -->
            <a href="#" class="group block bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-emerald-500 group-hover:bg-emerald-400 transition-colors"></div>
                <div class="flex justify-between items-start mb-4">
                    <span class="inline-block bg-emerald-50 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 text-[11px] font-bold tracking-wider uppercase px-2.5 py-1 rounded-md transition-colors">
                        名詞 (n.f.)
                    </span>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-1 transition-colors">Gourmandise</h3>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-4 transition-colors">貪吃 / 對美食的熱愛</p>
                
                <div class="pt-4 border-t border-slate-100 dark:border-slate-700/50 flex justify-between items-center text-xs text-slate-400 dark:text-slate-500">
                    <span>文化單字</span>
                    <span class="flex items-center gap-1">✨ 已複習</span>
                </div>
            </a>

            <!-- 單字卡片 3: 範例預留檔 -->
            <a href="#" class="group block bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-rose-500 group-hover:bg-rose-400 transition-colors"></div>
                <div class="flex justify-between items-start mb-4">
                    <span class="inline-block bg-rose-50 dark:bg-rose-900/40 text-rose-700 dark:text-rose-300 text-[11px] font-bold tracking-wider uppercase px-2.5 py-1 rounded-md transition-colors">
                        形容詞 (adj.)
                    </span>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-1 transition-colors">Éphémère</h3>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-4 transition-colors">短暫的 / 朝生暮死的</p>
                
                <div class="pt-4 border-t border-slate-100 dark:border-slate-700/50 flex justify-between items-center text-xs text-slate-400 dark:text-slate-500">
                    <span>高階單字</span>
                    <span class="flex items-center gap-1">⭐ 必考</span>
                </div>
            </a>

            <!-- 單字卡片 4: 範例預留檔 -->
            <a href="#" class="group block bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-amber-500 group-hover:bg-amber-400 transition-colors"></div>
                <div class="flex justify-between items-start mb-4">
                    <span class="inline-block bg-amber-50 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 text-[11px] font-bold tracking-wider uppercase px-2.5 py-1 rounded-md transition-colors">
                        動詞 (v.i.)
                    </span>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-1 transition-colors">Flâner</h3>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-4 transition-colors">漫步 / 閒逛</p>
                
                <div class="pt-4 border-t border-slate-100 dark:border-slate-700/50 flex justify-between items-center text-xs text-slate-400 dark:text-slate-500">
                    <span>無特定目的</span>
                    <span class="flex items-center gap-1">🚶‍♂️ 日常</span>
                </div>
            </a>

            <!-- 新增單字按鈕 (視覺展示用) -->
            <div class="group flex flex-col items-center justify-center bg-slate-100/50 dark:bg-slate-800/30 rounded-2xl p-6 border-2 border-dashed border-slate-300 dark:border-slate-700 hover:border-indigo-400 dark:hover:border-indigo-500 hover:bg-slate-100 dark:hover:bg-slate-800/80 transition-all duration-300 cursor-pointer min-h-[220px]">
                <div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center mb-3 group-hover:bg-indigo-100 dark:group-hover:bg-indigo-900/50 transition-colors text-slate-500 dark:text-slate-400 group-hover:text-indigo-600 dark:group-hover:text-indigo-400">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                </div>
                <span class="text-sm font-semibold text-slate-500 dark:text-slate-400 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
                    新增單字
                </span>
            </div>

        </div>
    </div>

    <script>
        // --- 深淺色切換功能 ---
        function toggleTheme() {
            const htmlEl = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            
            if (htmlEl.classList.contains('dark')) {
                htmlEl.classList.remove('dark');
                themeIcon.textContent = '🌙'; 
            } else {
                htmlEl.classList.add('dark');
                themeIcon.textContent = '☀️'; 
            }
        }
    </script>
</body>
</html>
